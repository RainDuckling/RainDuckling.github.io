baseURL = "https://RainDuckling.github.io/"
languageCode = "zh-cn"
title = "RainDuckling's Blog"
theme = "PaperMod"

[author]
    name = "RainDuckling"

[services]
    [services.googleAnalytics]
        ID = ""

[params]
    author = "RainDuckling"
    env = "production"
    
    [params.profileMode]
        enabled = true
        title = "你好，我是 RainDuckling 👋"
        subtitle = "一名正在构建个人世界的开发者"
        imageUrl = "https://github.com/RainDuckling.png"
        [[params.profileMode.buttons]]
            name = "阅读文章"
            url = "posts"
        [[params.profileMode.buttons]]
            name = "Itch.io"
            url = "https://rainduckling.itch.io"
        [[params.profileMode.buttons]]
            name = "X"
            url = "https://x.com/RainDuckling"

    # 社交图标配置
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/RainDuckling"
    [[params.socialIcons]]
        name = "itchnet"
        url = "https://rainduckling.itch.io"
    [[params.socialIcons]]
        name = "x"
        url = "https://x.com/RainDuckling"