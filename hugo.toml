baseURL = "https://rainduckling.github.io/"
languageCode = "zh-cn"
title = "RainDuckling's Blog"
theme = "PaperMod"

[outputs]
    home = ["HTML", "RSS", "JSON"]

[author]
    name = "RainDuckling"

# 2. 添加导航栏菜单
[[menu.main]]
    identifier = "search"
    name = "🔍 搜索"
    url = "search"
    weight = 10

[params]
    author = "RainDuckling"
    env = "production"
    
    [params.profileMode]
        enabled = true
        title = "你好，我是 RainDuckling 👋"
        subtitle = "一名正在构建个人世界的开发者"
        imageUrl = "https://github.com/RainDuckling.png"
        
        # 只保留“阅读文章”按钮，删除了 Itch 和 X 的大按钮
        [[params.profileMode.buttons]]
            name = "阅读文章"
            url = "posts"

    # 3. 社交图标保留（这些会以小图标形式显示在简介下方）
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/RainDuckling"
    [[params.socialIcons]]
        name = "itchnet"
        url = "https://rainduckling.itch.io"
    [[params.socialIcons]]
        name = "x"
        url = "https://x.com/RainDuckling"
    
    [params.fuseConfig]
        shouldSort = true
        location = 0
        distance = 100
        threshold = 0.4
        minMatchCharLength = 0
        keys = ["title", "permalink", "summary", "content"]